        :root {
            --bg-dark: #070709;
            --surface: rgba(25, 25, 30, 0.4);
            --surface-hover: rgba(40, 40, 45, 0.6);
            --border: rgba(255, 255, 255, 0.06);
            --text-main: #f5f5f7;
            --text-muted: #868690;
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        ::selection { background: var(--accent-glow); color: var(--accent); }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            cursor: none;
            transition: background 0.6s ease, color 0.6s ease;
        }

        .cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s;
            mix-blend-mode: difference;
        }
        .cursor.hovering {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -3;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.15) contrast(1.2);
            opacity: 0.8;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.05), transparent 50%),
                        radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.02), transparent 50%);
            z-index: -2;
            pointer-events: none;
        }

        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .loader-text {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .loader-bar {
            width: 150px; height: 1px; background: rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }
        .loader-bar::after {
            content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 0%; 
            background: var(--accent); animation: load 2s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }

        #continue-btn {
            display: none;
            padding: 12px 30px;
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            border-radius: 100px;
            cursor: none;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease forwards;
        }
        #continue-btn:hover {
            background: var(--text-main);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        @keyframes load { 0% {width: 0%;} 100% {width: 100%;} }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        main {
            width: 90%; max-width: 600px; margin: 80px auto 40px; padding: 50px 40px;
            background: var(--surface);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            text-align: center;
            opacity: 0; transform: translateY(30px); transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        body.loaded main { opacity: 1; transform: translateY(0); }

        .anim-item { opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        body.loaded .anim-item { opacity: 1; transform: translateY(0); }
        .d-1 { transition-delay: 0.2s; } .d-2 { transition-delay: 0.3s; } .d-3 { transition-delay: 0.4s; } .d-4 { transition-delay: 0.5s; } .d-5 { transition-delay: 0.6s; }

        .system-status { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }

            position: relative;

            color: #232323;
            isolation: isolate;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        .name-highlight::before {
            content: "";
            position: absolute;
            inset: -0.06em;
            border-radius: inherit;
            background:

        .name-highlight::after {

const musicCurrentTime = document.getElementById('music-current-time')
const musicTotalTime = document.getElementById('music-total-time')
const musicProgressFill = document.querySelector('.music-progress-fill')

let musicProgressInterval
let currentTrack = null
let gameStartTime = null
let gameName = ""
let lastTrackId = null
let lastPlayingState = null

const imgA = document.querySelector('.img-a')
const imgB = document.querySelector('.img-b')

let inactiveImg = imgB

imgB.classList.add('hidden')

function updateMusicProgress(startTime, endTime) {
    if (!startTime || !endTime) return
    const totalDuration = endTime - startTime
    
    const updateProgress = () => {
        const now = Date.now()
        const elapsed = now - startTime
        
        if (elapsed < 0 || elapsed > totalDuration) {
            clearInterval(musicProgressInterval)
            if(musicProgressContainer) musicProgressContainer.style.display = 'none'
            return
        }
        
        const progress = Math.min(Math.max(elapsed / totalDuration, 0), 1)
        const currentSec = Math.floor(elapsed / 1000)
        const totalSec = Math.floor(totalDuration / 1000)
        
        animateTime(musicCurrentTime, formatTime(currentSec))
        musicTotalTime.textContent = formatTime(totalSec)
        musicProgressFill.style.width = progress * 100 + '%'
    }
    
    clearInterval(musicProgressInterval)
    updateProgress()
    musicProgressInterval = setInterval(updateProgress, 1000)
    if(musicProgressContainer) musicProgressContainer.style.display = 'block'
}

function formatTime(seconds) {
    const mins = Math.floor(seconds / 60)
    const secs = Math.floor(seconds % 60)
    return mins + ':' + (secs < 10 ? '0' : '') + secs
}

function setupGallery() {
    const container = document.querySelector('.moments-container')
    const moments = container.querySelectorAll('.moment')
    if(moments.length === 0) return
    const cloneCount = 3
    for (let i = 0; i < cloneCount; i++) {
        moments.forEach(moment => {
            const clone = moment.cloneNode(true)
            container.appendChild(clone)
        })
    }
    const totalWidth = container.scrollWidth / cloneCount
    container.style.animation = 'scrollGallery ' + (totalWidth * 0.015) + 's linear infinite'
}

window.addEventListener('load', () => {
    setTimeout(() => {
        loaderInit.style.opacity = '0'
        setTimeout(() => {
            loaderInit.style.display = 'none'
            continueBtn.style.display = 'block'
        }, 500)
    }, 1800)
})

continueBtn.addEventListener('click', () => {
    preloader.style.opacity = '0'
    bgMusic.volume = 0.15
    bgMusic.play().catch(e => console.log(e))
    document.getElementById('musicToggle').innerHTML = '<i class="fas fa-music"></i>'
    
    setTimeout(() => {

        document.body.classList.add('loaded')

window.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px'
    cursor.style.top = e.clientY + 'px'
})

document.addEventListener('mouseover', (e) => {
    if (e.target.closest('a') || e.target.closest('button') || e.target.closest('.music-control') || e.target.closest('.moment')) {
        cursor.classList.add('hovering')
    }
})
document.addEventListener('mouseout', (e) => {
    if (e.target.closest('a') || e.target.closest('button') || e.target.closest('.music-control') || e.target.closest('.moment')) {
        cursor.classList.remove('hovering')
    }
})

const textToType = "10.12.2009 | City: Volgograd | Type: ISTJ | valid eblan"
const typeContainer = document.getElementById('typewriter-text')
let typeIndex = 0
function typeWriter() {
    if (typeIndex < textToType.length) {
        typeContainer.innerHTML += textToType.charAt(typeIndex)
        typeIndex++
        setTimeout(typeWriter, 40)
    }
}

const musicToggle = document.getElementById('musicToggle')
musicToggle.addEventListener('click', function(e) {
    e.stopPropagation()
    if (bgMusic.paused) { 
        bgMusic.play() 
        musicToggle.innerHTML = '<i class="fas fa-music"></i>' 
    } else { 
        bgMusic.pause() 
        musicToggle.innerHTML = '<i class="fas fa-volume-mute"></i>' 
    }
})

const DISCORD_ID = '1491053386752196722'


async function getDiscordStatus(){
    try{
        const res = await fetch('https://api.lanyard.rest/v1/users/' + DISCORD_ID)
        const json = await res.json()
        if(!json.success) return

        const data = json.data
        const dot = document.querySelector('.status-dot')
        const musicBox = document.querySelector('.music-progress-container')

        if(dot){
            dot.className = 'status-dot status-' + data.discord_status
        }

        const activities = data.activities || []

        if(data.listening_to_spotify && data.spotify){

            if (!data.spotify.timestamps) {
                lastPlayingState = false
            }

            const cover = document.getElementById('spotify-cover')
            const link = document.getElementById('spotify-link')

            if (cover && link) {
                console.log(data.spotify.album_art_url)

                const isNewTrack = data.spotify.track_id !== lastTrackId
                const isResumed = lastPlayingState === false && data.spotify.timestamps

                if (isNewTrack || isResumed) {
                    lastTrackId = data.spotify.track_id

                    const newSrc = data.spotify.album_art_url
                    const newText = data.spotify.artist + ' - ' + data.spotify.song

                    clearInterval(musicProgressInterval)
                    if (musicProgressContainer) {
                        musicProgressContainer.style.display = 'none'
                    }

                    const currentId = data.spotify.track_id

                    inactiveImg.src = newSrc
                    inactiveImg.crossOrigin = "anonymous"

                    inactiveImg.onload = () => {
                        if (currentId !== lastTrackId) return
                        document.getElementById('status-text').textContent = newText

                        inactiveImg.classList.add('visible')
                        inactiveImg.classList.remove('hidden')

                        activeImg.classList.remove('visible')
                        activeImg.classList.add('hidden')

                        const tempImg = activeImg
                        activeImg = inactiveImg
                        inactiveImg = tempImg

                        const colorThief = new ColorThief()
                        const color = colorThief.getColor(activeImg)

                        const rgb = `rgb(${color[0]}, ${color[1]}, ${color[2]})`
                        const glow = `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0.25)`

                        document.documentElement.style.setProperty('--accent', rgb)
                        document.documentElement.style.setProperty('--accent-glow', glow)

                        updateMusicProgress(
                            data.spotify.timestamps.start,
                            data.spotify.timestamps.end
                        )
                    }
                }

                link.href = 'https://open.spotify.com/track/' + data.spotify.track_id

                cover.style.display = 'block'
                
                lastTrackId = data.spotify.track_id
                lastPlayingState = true
            }

            return
        }

        const game = activities.find(a => a.type === 0)
        if(game){
            gameName = game.name
            gameStartTime = game.timestamps ? game.timestamps.start : null
            document.getElementById('status-text').textContent = '🎮 ' + gameName
            if(musicBox) musicBox.style.display = 'none'
            const cover = document.getElementById('spotify-cover')
            if (cover) cover.style.display = 'none'
            return
        } else {
            gameStartTime = null
        }

        const custom = activities.find(a => a.type === 4)
        if(custom){
            document.getElementById('status-text').textContent = custom.state || ''
            lastPlayingState = false
            if(musicBox) musicBox.style.display='none'
            const cover = document.getElementById('spotify-cover')
            if (cover) cover.style.display = 'none'
            return
            
        }

        document.getElementById('status-text').textContent = data.discord_status.toUpperCase()
        lastPlayingState = false
        if(musicBox) musicBox.style.display='none'

        const cover = document.getElementById('spotify-cover')
        if (cover) cover.style.display = 'none'

    }catch(e){
        console.log(e)
    }
}

function animateTime(el, newValue) {
    const chars = newValue.split('')

    let spans = el.querySelectorAll('span')

    if (spans.length !== chars.length) {
        el.innerHTML = ''
        chars.forEach(char => {
            const span = document.createElement('span')
            span.textContent = char
            el.appendChild(span)
        })
        return
    }

    chars.forEach((char, i) => {
        if (spans[i].textContent !== char) {
            spans[i].textContent = char

            spans[i].style.animation = 'none'
            spans[i].offsetHeight
            spans[i].style.animation = 'timeUp 0.25s ease'
        }
    })
}


function initStaticTime(el) {
    const chars = el.textContent.split('')
    el.innerHTML = ''
    chars.forEach(char => {
        const span = document.createElement('span')
        span.textContent = char
        el.appendChild(span)
    })
}

initStaticTime(musicTotalTime)
    
    
setInterval(getDiscordStatus, 5000)
getDiscordStatus()
